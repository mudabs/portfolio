name: Build And Deploy VPS Container

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: portfolio-site
  ARCHIVE_NAME: portfolio-image-${{ github.sha }}.tar.gz
  SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}
  DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH || '/opt/portfolio' }}
  CONTAINER_NAME: ${{ secrets.VPS_CONTAINER_NAME || 'portfolio-site' }}
  HOST_PORT: ${{ secrets.VPS_HOST_PORT || '8080' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} -t $IMAGE_NAME:latest .

      - name: Export Docker image
        run: docker save $IMAGE_NAME:${{ github.sha }} | gzip > $ARCHIVE_NAME

      - name: Copy image archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          source: ${{ env.ARCHIVE_NAME }}
          target: ${{ env.DEPLOY_PATH }}

      - name: Load and restart container on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          script_stop: true
          script: |
            set -eu
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            docker load -i "$ARCHIVE_NAME"
            rm -f "$ARCHIVE_NAME"

            if docker ps -aq --filter "name=^/${CONTAINER_NAME}$" | grep -q .; then
              docker rm -f "$CONTAINER_NAME"
            fi

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "$HOST_PORT:80" \
              "$IMAGE_NAME:${{ github.sha }}"

            docker image prune -f
          envs: DEPLOY_PATH,ARCHIVE_NAME,CONTAINER_NAME,HOST_PORT
