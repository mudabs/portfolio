name: Build And Deploy Static Files

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ARCHIVE_NAME: portfolio-dist-${{ github.sha }}.tar.gz
  DEPLOY_PATH: /var/www/portfolio

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Archive dist files
        run: tar -czf $ARCHIVE_NAME dist

      - name: Copy build archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: ${{ env.ARCHIVE_NAME }}
          target: /tmp

      - name: Publish files on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -eu
            ARCHIVE_PATH="/tmp/$ARCHIVE_NAME"
            TEMP_DIR=$(mktemp -d)

            mkdir -p "$DEPLOY_PATH"
            tar -xzf "$ARCHIVE_PATH" -C "$TEMP_DIR"
            rm -f "$ARCHIVE_PATH"

            find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            cp -r "$TEMP_DIR/dist"/* "$DEPLOY_PATH"/
            rm -rf "$TEMP_DIR"
          envs: DEPLOY_PATH,ARCHIVE_NAME
